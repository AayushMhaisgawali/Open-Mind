services:
  - type: web
    name: open-mind-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements-render.txt && pip install -e .
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: RETRIEVAL_PROVIDER
        value: duckduckgo
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: REQUIRE_REAL_CONFIDENCE_MODEL
        value: "true"
      - key: SERPAPI_API_KEY
        sync: false
      - key: SERPAPI_GOOGLE_DOMAIN
        value: google.com
      - key: SERPAPI_GL
        value: us
      - key: SERPAPI_HL
        value: en
